name: Tauri Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: dota-pilot1/twillo-callbot-front
          path: twillo-callbot-front

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        working-directory: twillo-callbot-front
        run: npm ci

      - name: Install tauri deps
        run: npm ci

      # 로컬과 동일한 경로 구조 (../twillo-callbot-front) 를 만들어서
      # tauri.conf.json의 beforeBuildCommand/frontendDist 변경 없이 빌드
      - name: Symlink frontend as sibling (macOS)
        if: runner.os != 'Windows'
        run: ln -s "$GITHUB_WORKSPACE/twillo-callbot-front" ../twillo-callbot-front

      - name: Symlink frontend as sibling (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: mklink /D "..\twillo-callbot-front" "%GITHUB_WORKSPACE%\twillo-callbot-front"

      - name: Build & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Twillo Clinic Console ${{ github.ref_name }}"
          releaseBody: "자동 빌드된 릴리스입니다. macOS는 .dmg, Windows는 .exe 설치 파일을 받아 설치하세요."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
